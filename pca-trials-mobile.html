<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>攝護腺癌臨床試驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--mcspc:#6D28D9;--nmcrpc:#B45309;--mcrpc:#B91C1C;--bg:#F8F9FB;--card:#FFFFFF;--border:#E2E8F0;--border2:#CBD5E1;--text:#0F172A;--sub:#475569;--muted:#94A3B8;--r:14px;--shadow:0 1px 4px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.55}
.header{background:#fff;border-bottom:1.5px solid var(--border);padding:16px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#6D28D9 0%,#B91C1C 100%);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:17px;font-weight:700;color:var(--text)}
.header-title span{font-size:12px;font-weight:400;color:var(--muted);display:block;margin-top:1px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;padding:10px 12px 10px 38px;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--mcspc)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px}
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);background:var(--bg);color:var(--sub);cursor:pointer;transition:all .15s;user-select:none}
.pill.all.on{background:#0F172A;border-color:#0F172A;color:#fff}
.pill.mcspc.on{background:#EDE9FE;border-color:var(--mcspc);color:var(--mcspc)}
.pill.nmcrpc.on{background:#FEF3C7;border-color:var(--nmcrpc);color:var(--nmcrpc)}
.pill.mcrpc.on{background:#FEE2E2;border-color:var(--mcrpc);color:var(--mcrpc)}
.main{padding:12px 12px 72px}
.count{font-size:13px;color:var(--muted);margin-bottom:10px;padding:0 2px}
.stage-anchor{padding:18px 4px 8px}
.stage-header{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:6px 14px 6px 10px;border-radius:8px}
.sh-mcspc{background:#EDE9FE;color:var(--mcspc)}
.sh-nmcrpc{background:#FEF3C7;color:var(--nmcrpc)}
.sh-mcrpc{background:#FEE2E2;color:var(--mcrpc)}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border:1.5px solid var(--border)}
.card.hidden{display:none}
.card-head{padding:14px 14px 10px;cursor:pointer;display:grid;grid-template-columns:6px 1fr auto;gap:12px;align-items:start;user-select:none}
.card-head:active{background:#F8F9FB}
.stage-bar{width:6px;border-radius:3px;min-height:36px;margin-top:2px;flex-shrink:0}
.bar-mcspc{background:var(--mcspc)}
.bar-nmcrpc{background:var(--nmcrpc)}
.bar-mcrpc{background:var(--mcrpc)}
.card-meta{min-width:0}
.card-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.card-sub{font-size:13px;color:var(--sub);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.stage-tag{font-size:11px;font-family:'DM Mono',monospace;font-weight:600;padding:2px 8px;border-radius:5px}
.tag-mcspc{background:#EDE9FE;color:var(--mcspc)}
.tag-nmcrpc{background:#FEF3C7;color:var(--nmcrpc)}
.tag-mcrpc{background:#FEE2E2;color:var(--mcrpc)}
.chevron{color:var(--muted);font-size:20px;transition:transform .22s;margin-top:2px}
.chevron.open{transform:rotate(180deg)}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 12px 32px}
.chip{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;padding:4px 10px;border-radius:6px;border:1.5px solid var(--border2);color:var(--sub);background:var(--bg)}
.chip.regimen{border-color:#D6E3EC;background:#EEF4F8;color:#4A6475}
.chip.good{border-color:#16A34A;background:#F0FDF4;color:#15803D}
.chip.warn{border-color:#CA8A04;background:#FEFCE8;color:#A16207}
.chip.info{border-color:#2563EB;background:#EFF6FF;color:#1D4ED8}
.card-body{display:none;border-top:1.5px solid var(--border)}
.card-body.open{display:block}
.section{padding:14px;border-bottom:1px solid var(--border)}
.section:last-child{border-bottom:none}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-label-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-text{font-size:14px;color:var(--sub);line-height:1.65}
.sec-text strong{color:var(--text);font-weight:600}
.regimen-box{background:#F8F9FB;border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px}
.regimen-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.regimen-row:last-child{margin-bottom:0}
.regimen-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.regimen-val{font-size:14px;color:var(--text);line-height:1.6}
.regimen-divider{height:1px;background:var(--border);margin:8px 0}
.outcome-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}
.outcome-row:last-child{border-bottom:none;padding-bottom:0}
.out-label{font-size:13px;color:var(--sub);flex:1;line-height:1.4}
.out-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;text-align:right;flex-shrink:0;max-width:55%}
.out-val.pos{color:#15803D}
.out-val.neu{color:#A16207}
.out-val.neg{color:#B91C1C}
.ae-box{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:12px 14px}
.ae-text{font-size:14px;color:#78350F;line-height:1.65}
.conclusion{background:linear-gradient(135deg,#EFF6FF 0%,#F0F9FF 100%);border-top:3px solid #2563EB;padding:16px 14px}
.conclusion-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#2563EB;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.conclusion-text{font-size:14px;color:#1E3A5F;line-height:1.75}
.conclusion-text strong{color:#1E40AF}
.importance{background:#F5F3FF;border:1.5px solid #C4B5FD;border-radius:10px;padding:11px 13px;margin-top:12px}
.imp-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7C3AED;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.imp-text{font-size:13px;color:#4C1D95;line-height:1.65}
.landmark{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;margin-top:12px;background:#DBEAFE;color:#1D4ED8;border:1.5px solid #93C5FD}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1.5px solid var(--border);display:flex;padding:8px 10px 12px;gap:6px;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.bn-btn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);font-size:12px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;background:var(--bg);color:var(--sub);transition:.15s}
.bn-btn:active{opacity:.7;transform:scale(.97)}
.bn-mcspc{color:var(--mcspc);border-color:#C4B5FD;background:#F5F3FF}
.bn-nmcrpc{color:var(--nmcrpc);border-color:#FDE68A;background:#FFFBEB}
.bn-mcrpc{color:var(--mcrpc);border-color:#FECACA;background:#FFF5F5}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;display:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">📊 </div>
    <div class="header-title">攝護腺癌臨床試驗<span>mCSPC / nmCRPC / mCRPC</span></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="搜尋 trial 名稱、藥物..." oninput="filter()">
  </div>
  <div class="pills">
    <div class="pill all on" onclick="setStage('all')">全部</div>
    <div class="pill mcspc" onclick="setStage('mCSPC')">mCSPC</div>
    <div class="pill nmcrpc" onclick="setStage('nmCRPC')">nmCRPC</div>
    <div class="pill mcrpc" onclick="setStage('mCRPC')">mCRPC</div>
  </div>
</div>
<div class="main">
  <div class="count" id="count"></div>
  <div id="list"></div>
  <div class="no-results" id="noResult">找不到符合條件的 trial</div>
</div>
<div class="bottom-nav">
  <button class="bn-btn bn-mcspc" onclick="jump('mCSPC')">mCSPC</button>
  <button class="bn-btn bn-nmcrpc" onclick="jump('nmCRPC')">nmCRPC</button>
  <button class="bn-btn bn-mcrpc" onclick="jump('mCRPC')">mCRPC</button>
</div>
<script>
const DATA=[
{name:"CHAARTED",year:"2015 / 2018(update)",stage:"mCSPC",inclusion:"mCSPC（影像確認轉移）；過去使用ADT<24m且停藥超過12m後progression；mCSPC使用ADT<120 天；無先前化療；ECOG 0-2",exclusion:"先前 docetaxel；嚴重 peripheral neuropathy；ANC <1500；非去勢抵抗",regimen:{exp:"ADT + Docetaxel 75 mg/m² IV",schedule:"q3w（每 3 週 1 次）",duration:"共 6 cycles（約 18 週）",ctrl:"ADT alone（持續）"},followUp:"53.2 個月",outcomes:[{l:"OS HR ",v:"0.61（57.6 vs 44.0 mo）",t:"pos"},{l:"OS HR（high-volume）",v:"0.60（49.2 vs 32.2 mo）",t:"pos"},{l:"OS HR（low-volume）",v:"0.60（NR vs NR）",t:"neu"},{l:"6m PSA <0.2 ng/mL",v:"32.0% vs 19.6%",t:"pos"},{l:"1y PSA <0.2 ng/mL",v:"27.7% vs 16.8%",t:"pos"},{l:"Time to CRPC HR",v:"0.61（20.2 vs 11.7 mo）",t:"pos"},{l:"Time to clinical progression HR",v:"0.61（33.0 vs 19.8 mo）",t:"pos"}],ae:"Gr4: neutropenia 9%, thromboembolism 0.5%",conclusion:"對於 <strong>High-volume (visceral mets or ≥4 bone mets 至少一處中軸骨外) 的 mCSPC 病人</strong>，CHAARTED 試驗顯示使用 <strong>ADT + Docetaxel 6 cycles</strong> 可改善 OS（HR 0.61）。",importance:"🔑 mCSPC 第一個確認化療 combination 改善 OS 的 Phase III，建立「volume」分層概念，開啟 mCSPC 積極治療時代。",chips:[{t:"ADT + Doc",c:"regimen"},{t:"High volume",c:"warn"}]},
{name:"LATITUDE",year:"2017",stage:"mCSPC",inclusion:"新診斷 high-risk mCSPC；≥2 high-risk factors",exclusion:"先前chemo/RT",regimen:{exp:"ADT + Abiraterone 1000 mg QD + Prednisone 5 mg QD",schedule:"每日持續口服",duration:"直至疾病進展",ctrl:"ADT + Pred + Placebo"},followUp:"51.8 個月",outcomes:[{l:"OS HR",v:"0.66（53.3 vs 36.5 mo）",t:"pos"},{l:"PSA <0.2 ng/mL",v:"62% vs 21%",t:"pos"}],ae:"Hypertension 41%；Hypokalemia 24%",conclusion:"對於 <strong>新診斷 high-risk mCSPC 的病人</strong>，LATITUDE 試驗顯示 ADT + Abiraterone 可改善 OS。",importance:"🔑 mCSPC 第一個 ARPI combination Phase III。",chips:[{t:"ADT + Abi + Pred",c:"regimen"},{t:"High risk",c:"warn"}]},
{name:"ENZAMET",year:"2019",stage:"mCSPC",inclusion:"mCSPC（影像轉移）",exclusion:"先前 enzalutamide 或 abiraterone",regimen:{exp:"ADT + Enzalutamide 160 mg/day PO",schedule:"每日持續口服",duration:"直至疾病進展",ctrl:"ADT + NSAA"},followUp:"34 個月",outcomes:[{l:"OS HR（整體）",v:"0.67（3yr: 80% vs 72%）",t:"pos"}],ae:"Fatigue 33%；Falls 16%",conclusion:"對於 <strong>mCSPC 病人</strong>，ENZAMET 試驗顯示 ADT + Enzalutamide 可改善 OS。",importance:"🔑 確立 enzalutamide 在 mCSPC 的 OS benefit。",chips:[{t:"ADT + Enza",c:"regimen"},{t:"OS HR 0.67",c:"good"}]},
{name:"SPARTAN",year:"2018",stage:"nmCRPC",inclusion:"nmCRPC；PSADT ≤10 月",exclusion:"遠端轉移",regimen:{exp:"ADT + Apalutamide 240 mg/day PO",schedule:"每日持續口服",duration:"直至轉移或進展",ctrl:"ADT + Placebo"},followUp:"41.0 個月",outcomes:[{l:"MFS HR",v:"0.28（40.5 vs 16.2 mo）",t:"pos"},{l:"OS HR",v:"0.78",t:"pos"}],ae:"Fatigue 30%；Rash 24%",conclusion:"對於 <strong>高風險 nmCRPC 病人</strong>，SPARTAN 試驗顯示 ADT + Apalutamide 可延長 MFS。",importance:"🔑 nmCRPC 第一線治療標準。",chips:[{t:"ADT + Apa",c:"regimen"},{t:"MFS HR 0.28",c:"good"}]},
{name:"PROSPER",year:"2018",stage:"nmCRPC",inclusion:"nmCRPC；PSADT ≤10 月",exclusion:"遠端轉移",regimen:{exp:"ADT + Enzalutamide 160 mg/day PO",schedule:"每日持續口服",duration:"直至轉移或進展",ctrl:"ADT + Placebo"},followUp:"48.0 個月",outcomes:[{l:"MFS HR",v:"0.29（36.6 vs 14.7 mo）",t:"pos"},{l:"OS HR",v:"0.73",t:"pos"}],ae:"Fatigue 33%",conclusion:"對於 <strong>nmCRPC 病人</strong>，PROSPER 試驗顯示 ADT + Enzalutamide 可延長 MFS。",importance:"🔑 nmCRPC 第一線治療標準。",chips:[{t:"ADT + Enza",c:"regimen"},{t:"MFS HR 0.29",c:"good"}]},
{name:"AFFIRM",year:"2012",stage:"mCRPC",inclusion:"mCRPC；post-docetaxel",exclusion:"腦轉移",regimen:{exp:"Enzalutamide 160 mg/day PO",schedule:"每日口服",duration:"直至進展",ctrl:"Placebo"},followUp:"14.4 個月",outcomes:[{l:"OS HR",v:"0.63（18.4 vs 13.6 mo）",t:"pos"},{l:"rPFS HR",v:"0.40",t:"pos"}],ae:"Fatigue 34%",conclusion:"對於 <strong>docetaxel 後進展的 mCRPC 病人</strong>，AFFIRM 試驗顯示 Enzalutamide 可改善 OS。",importance:"🔑 改變 post-chemotherapy mCRPC 格局。",chips:[{t:"Enza (Post-Doc)",c:"regimen"},{t:"OS HR 0.63",c:"good"}]},
{name:"PREVAIL",year:"2014",stage:"mCRPC",inclusion:"Chemo-naive mCRPC",exclusion:"先前 docetaxel",regimen:{exp:"Enzalutamide 160 mg/day PO",schedule:"每日口服",duration:"直至進展",ctrl:"Placebo"},followUp:"31.0 個月",outcomes:[{l:"rPFS HR",v:"0.19（NR vs 3.9 mo）",t:"pos"},{l:"OS HR",v:"0.71",t:"pos"}],ae:"Fatigue 36%",conclusion:"對於 <strong>無症狀 chemo-naive mCRPC 病人</strong>，PREVAIL 試驗顯示 Enzalutamide 的 rPFS 有最大差距。",importance:"🔑 chemo-naive mCRPC ARPI 標準。",chips:[{t:"Enza",c:"regimen"},{t:"rPFS HR 0.19",c:"good"}]}
];

const STAGES=["mCSPC","nmCRPC","mCRPC"];
let activeStage="all";
function sc(s){return s.replace(/[^a-z]/gi,"").toLowerCase()}
function stageIcon(s){return{mCSPC:"◉",nmCRPC:"◆",mCRPC:"●"}[s]||"●"}

function buildCards(){
  const list=document.getElementById("list");
  list.innerHTML="";
  STAGES.forEach(stage=>{
    const anchor=document.createElement("div");
    anchor.className="stage-anchor";
    anchor.id="anchor-"+stage;
    anchor.innerHTML=`<div class="stage-header sh-${sc(stage)}"><span>${stageIcon(stage)}</span>${stage}</div>`;
    list.appendChild(anchor);
    DATA.filter(t=>t.stage===stage).forEach((trial,idx)=>{
      const card=document.createElement("div");
      const cls=sc(trial.stage);
      card.className="card";
      card.dataset.stage=trial.stage;
      card.dataset.search=[trial.name,trial.inclusion,trial.regimen.exp,trial.regimen.ctrl,trial.conclusion,trial.importance].join(" ").toLowerCase();
      const chipsHtml=trial.chips.map(c=>`<span class="chip ${c.c}">${c.t}</span>`).join("");
      const outHtml=trial.outcomes.map(o=>`<div class="outcome-row"><span class="out-label">${o.l}</span><span class="out-val ${o.t}">${o.v}</span></div>`).join("");
      card.innerHTML=`
        <div class="card-head" onclick="toggle('B${idx}${cls}','C${idx}${cls}')">
          <div class="stage-bar bar-${cls}"></div>
          <div class="card-meta">
            <div class="card-name">${trial.name}</div>
            <div class="card-sub">
              <span class="stage-tag tag-${cls}">${trial.stage}</span>
              <span>${trial.year}</span>
              <span style="color:#CBD5E1">·</span>
              <span>F/U: ${trial.followUp}</span>
            </div>
          </div>
          <div class="chevron" id="C${idx}${cls}">⌄</div>
        </div>
        <div class="chips">${chipsHtml}</div>
        <div class="card-body" id="B${idx}${cls}">
          <div class="section">
            <div class="sec-label"><span class="sec-label-dot" style="background:#3B82F6"></span>入組條件 Inclusion</div>
            <div class="sec-text">${trial.inclusion}</div>
          </div>
          <div class="section">
            <div class="sec-label"><span class="sec-label-dot" style="background:#EF4444"></span>排除條件 Exclusion</div>
            <div class="sec-text">${trial.exclusion}</div>
          </div>
          <div class="section">
            <div class="sec-label"><span class="sec-label-dot" style="background:#F59E0B"></span>治療方案 Regimen</div>
            <div class="regimen-box">
              <div class="regimen-row"><div class="regimen-label">💊 實驗組</div><div class="regimen-val">${trial.regimen.exp}</div></div>
              <div class="regimen-row"><div class="regimen-label">📅 給藥頻率</div><div class="regimen-val">${trial.regimen.schedule}</div></div>
              <div class="regimen-row"><div class="regimen-label">⏱ 總療程</div><div class="regimen-val">${trial.regimen.duration}</div></div>
              <div class="regimen-divider"></div>
              <div class="regimen-row"><div class="regimen-label">🔲 對照組</div><div class="regimen-val" style="color:#64748B">${trial.regimen.ctrl}</div></div>
            </div>
          </div>
          <div class="section">
            <div class="sec-label"><span class="sec-label-dot" style="background:#10B981"></span>主要成效</div>
            ${outHtml}
          </div>
          <div class="section">
            <div class="sec-label"><span class="sec-label-dot" style="background:#F59E0B"></span>⚠ 主要副作用</div>
            <div class="ae-box"><div class="ae-text">${trial.ae}</div></div>
          </div>
          <div class="conclusion">
            <div class="conclusion-lbl">✦ 臨床總結</div>
            <div class="conclusion-text">${trial.conclusion}</div>
            <div class="importance">
              <div class="imp-lbl">🏛 Trial 重要性</div>
              <div class="imp-text">${trial.importance}</div>
            </div>
            <div class="landmark">★ ${trial.chips[0].t}</div>
          </div>
        </div>`;
      list.appendChild(card);
    });
  });
  filter();
}

function toggle(bId,cId){
  const b=document.getElementById(bId);
  const c=document.getElementById(cId);
  if(!b)return;
  b.classList.toggle("open");
  if(c)c.classList.toggle("open");
}

function setStage(s){
  activeStage=s;
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));
  const map={all:"all",mCSPC:"mcspc",nmCRPC:"nmcrpc",mCRPC:"mcrpc"};
  const el=document.querySelector(".pill."+(map[s]||s));
  if(el)el.classList.add("on");
  filter();
}

function filter(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  let shown=0;
  document.querySelectorAll(".card").forEach(c=>{
    const ok=(activeStage==="all"||c.dataset.stage===activeStage)&&(!q||c.textContent.toLowerCase().includes(q));
    c.classList.toggle("hidden",!ok);
    if(ok)shown++;
  });
  document.querySelectorAll(".stage-anchor").forEach(a=>{
    const st=a.id.replace("anchor-","");
    const vis=[...document.querySelectorAll(`.card[data-stage="${st}"]`)].some(c=>!c.classList.contains("hidden"));
    a.style.display=vis?"":"none";
  });
  const nr=document.getElementById("noResult");
  if(nr)nr.style.display=shown>0?"none":"block";
  document.getElementById("count").textContent=`顯示 ${shown} / ${DATA.length} 項 trial`;
}

function jump(stage){
  setStage(stage);
  const a=document.getElementById("anchor-"+stage);
  if(a)setTimeout(()=>a.scrollIntoView({behavior:"smooth",block:"start"}),80);
}

buildCards();

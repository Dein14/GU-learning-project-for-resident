<!DOCTYPE html>
<html>
<head>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文獻與數據清單</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f8f9fa;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
    }

    h1 { color: #343a40; text-align: center; margin-bottom: 25px; }

    #search {
        padding: 12px; width: 100%; box-sizing: border-box;
        border: 2px solid #e9ecef; border-radius: 25px; /* 膠囊狀搜尋欄 */
        font-size: 16px; margin-bottom: 25px; text-align: center;
        outline: none; transition: 0.3s;
    }
    #search:focus { border-color: #495057; }

    #list { list-style: none; padding: 0; }
    #list li { margin-bottom: 20px; }

    /* 底圖卡片設定 */
    #list a {
        display: block;
        height: 100px; /* 給卡片一個高度 */
        padding: 20px;
        box-sizing: border-box;
        border-radius: 12px;
        color: white; /* 圖片上的字體改為白色 */
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.7); /* 幫文字加陰影，防止被背景圖吃掉 */
        
        /* 預設背景圖（使用 Unsplash 醫學/科技感的漸層縮圖） */
        background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1507668077129-56e32842fceb?w=800&auto=format&fit=crop&q=60');
        background-size: cover;
        background-position: center;
        
        display: flex;
        align-items: center; /* 讓文字在卡片中垂直居中 */
        transition: transform 0.3s, box-shadow 0.3s;
    }

    /* 懸停效果 */
    #list a:hover {
        transform: scale(1.02); /* 卡片微微放大 */
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* 💡 進階：如果你想讓不同的卡片有不同的底圖，可以像下面這樣個別指定背景 */
    .bg-prostate {
        background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1457369804613-52c61a468e7d?w=800&auto=format&fit=crop&q=60') !important;
    }
    /* ==========================================
   手機版自適應微調 (螢幕寬度 600px 以下生效)
   ========================================== */
@media (max-width: 600px) {
    body {
        padding: 12px; /* 縮小手機版網頁左右留白，留給內容更多空間 */
    }

    h1 {
        font-size: 24px; /* 稍微縮小手機版的大標題，避免折行太難看 */
    }

    /* 調整底圖字卡在手機上的表現 */
    #list a.card-bg {
        height: 90px;      /* 稍微縮短手機版的字卡高度，看起來更精緻 */
        padding: 15px;     /* 縮小內襯 */
        font-size: 16px;   /* 微調字卡內的字體大小 */
    }
}
</style>
</head>

<body>

<h1>📂 機智GU住院醫師</h1>

<input id="search" placeholder="🔍 輸入關鍵字篩選報告...">

<ul id="list">
    <li><a href="pca-trials-mobile.html" class="bg-prostate">📊 CaP臨床試驗</a></li>
    <li><a href="pca-trials-mobile.html" class="bg-prostate">📊 RCC臨床試驗</a></li>
</ul>

<script>
let input = document.getElementById("search");
input.addEventListener("keyup", function(){
    let keyword = this.value.toLowerCase();
    document.querySelectorAll("#list li").forEach(li => {
        li.style.display =
            li.innerText.toLowerCase().includes(keyword) ? "" : "none";
    });
});
</script>

</body>
</html>
